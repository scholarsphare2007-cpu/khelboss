<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhelBhai Ludo - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<a href="admindashboard.html" class="text-amber-400 font-bold text-xs"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
<body class="bg-slate-950 text-white font-sans antialiased selection:bg-amber-500 selection:text-slate-950">

    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-red-600 text-white h-8 w-8 rounded-lg flex items-center justify-center font-black text-sm">A</div>
                <h1 class="text-base font-black text-slate-100 tracking-wide">KhelBhai Admin Engine</h1>
            </div>
            <a href="login.html" class="text-xs text-slate-400 hover:text-white transition-all"><i class="fa-solid fa-right-from-bracket mr-1"></i> Exit Panel</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        
        <section class="bg-slate-900 rounded-xl border border-slate-800 p-4 shadow-xl">
            <h2 class="text-sm font-black text-amber-400 uppercase tracking-wider mb-4"><i class="fa-solid fa-user-clock mr-2 text-amber-500"></i> Pending Approvals Requests</h2>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-800 text-[11px] text-slate-400 uppercase font-black">
                            <th class="pb-2.5">Player Details</th>
                            <th class="pb-2.5">Mobile</th>
                            <th class="pb-2.5">Password</th>
                            <th class="pb-2.5 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pending-table-body" class="divide-y divide-slate-800 text-xs">
                        <!-- Dynamic Pending List Injection -->
                    </tbody>
                </table>
            </div>
        </section>

        <section class="bg-slate-900 rounded-xl border border-slate-800 p-4 shadow-xl">
            <h2 class="text-sm font-black text-slate-400 uppercase tracking-wider mb-4"><i class="fa-solid fa-users-gear mr-2 text-slate-500"></i> All Registered Accounts Status</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-800 text-[11px] text-slate-400 uppercase font-black">
                            <th class="pb-2.5">Name</th>
                            <th class="pb-2.5">Mobile</th>
                            <th class="pb-2.5">Status</th>
                        </tr>
                    </thead>
                    <tbody id="all-users-body" class="divide-y divide-slate-800 text-xs text-slate-400">
                        <!-- Dynamic All List Injection -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        function loadData() {
            let db = JSON.parse(localStorage.getItem("users_db") || "[]");
            let pendingBody = document.getElementById("pending-table-body");
            let allBody = document.getElementById("all-users-body");
            
            pendingBody.innerHTML = "";
            allBody.innerHTML = "";

            let pendingCount = 0;

            db.forEach((user, index) => {
                // Render Pending Users Table
                if(user.status === "Pending") {
                    pendingCount++;
                    pendingBody.innerHTML += `
                        <tr class="hover:bg-slate-900/40">
                            <td class="py-3 font-bold text-slate-200"><i class="fa-solid fa-user text-slate-500 mr-1.5"></i> ${user.name}</td>
                            <td class="py-3 font-mono">${user.mobile}</td>
                            <td class="py-3 font-mono text-slate-500">${user.password}</td>
                            <td class="py-3 text-center space-x-2">
                                <button onclick="updateStatus(${index}, 'Approved')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-3 py-1 rounded transition-all"><i class="fa-solid fa-check"></i> Approve</button>
                                <button onclick="updateStatus(${index}, 'Rejected')" class="bg-red-600 hover:bg-red-500 text-white font-bold px-3 py-1 rounded transition-all"><i class="fa-solid fa-xmark"></i> Reject</button>
                            </td>
                        </tr>
                    `;
                }

                // Render All Status List Table
                let statusBadge = user.status === 'Approved' ? '<span class="text-emerald-400 font-bold bg-emerald-500/10 px-2 py-0.5 rounded">Approved</span>' : 
                                  user.status === 'Rejected' ? '<span class="text-red-400 font-bold bg-red-500/10 px-2 py-0.5 rounded">Rejected</span>' :
                                  '<span class="text-amber-400 font-bold bg-amber-500/10 px-2 py-0.5 rounded">Pending</span>';

                allBody.innerHTML += `
                    <tr class="hover:bg-slate-900/40">
                        <td class="py-2.5">${user.name}</td>
                        <td class="py-2.5 font-mono">${user.mobile}</td>
                        <td class="py-2.5">${statusBadge}</td>
                    </tr>
                `;
            });

            if(pendingCount === 0) {
                pendingBody.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-slate-500 italic">Koi pending request nahi hai abhi.</td></tr>`;
            }
        }

        function updateStatus(index, newStatus) {
            let db = JSON.parse(localStorage.getItem("users_db"));
            db[index].status = newStatus;
            localStorage.setItem("users_db", JSON.stringify(db));
            loadData();
        }

        // Init load
        document.addEventListener("DOMContentLoaded", loadData);
    </script>
</body>
</html>
